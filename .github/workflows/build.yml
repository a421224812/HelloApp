name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Debug - check build output
        if: failure()
        run: find . -name "*.apk" -o -name "*.txt" -o -name "*.log" | head -20 && ls -la app/build/outputs/ 2>/dev/null || echo "无构建输出目录"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: helloapp-release
          path: app/build/outputs/apk/release/*.apk
