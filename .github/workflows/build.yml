name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --no-daemon

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/build.log

      - name: Show error log
        if: failure()
        run: |
          echo "=== 构建完整日志 ==="
          cat /tmp/build.log 2>/dev/null || echo "无日志文件"
          echo "=== 目录结构 ==="
          find . -not -path './.git/*' -type f | head -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: helloapp-release
          path: app/build/outputs/apk/release/*.apk
